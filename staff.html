<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Time-Off — Provider Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#f7f5f2; --surface:#fff; --surface-2:#f0ede8; --border:#e5e0d8;
      --text:#1a1714; --text-muted:#8a8178;
      --accent:#2d6a7f; --accent-light:#e8f2f5;
      --pending:#c4622d; --pending-light:#fdf0e8;
      --approved:#3a7d5a; --approved-light:#eaf4ee;
      --radius:12px;
      --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

    header{background:var(--accent);color:#fff;padding:24px 40px;display:flex;align-items:center;justify-content:space-between}
    .header-left h1{font-family:'DM Serif Display',serif;font-size:1.7rem;font-weight:400;letter-spacing:-.02em}
    .header-left .tag{display:inline-block;background:rgba(255,255,255,.2);font-size:.72rem;padding:2px 10px;border-radius:20px;margin-top:6px;letter-spacing:.05em;font-weight:500}
    .refresh-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;padding:7px 16px;border-radius:20px;font-size:.8rem;cursor:pointer;font-family:'DM Sans',sans-serif}
    .refresh-btn:hover{background:rgba(255,255,255,.25)}
    #last-updated{font-size:.78rem;opacity:.65}
    .header-right{display:flex;align-items:center;gap:12px}

    main{max-width:1100px;margin:0 auto;padding:32px 24px 64px;display:grid;grid-template-columns:1fr 360px;gap:24px;align-items:start}
    @media(max-width:800px){main{grid-template-columns:1fr}}

    /* REQUEST FORM */
    .form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;position:sticky;top:24px}
    .form-header{padding:18px 24px;background:var(--surface-2);border-bottom:1px solid var(--border)}
    .form-header h2{font-family:'DM Serif Display',serif;font-size:1.1rem;font-weight:400;display:flex;align-items:center;gap:8px}
    .form-body{padding:24px}
    .field{margin-bottom:18px}
    .field label{display:block;font-size:.82rem;font-weight:500;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
    .field input,.field select,.field textarea{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:.9rem;font-family:'DM Sans',sans-serif;background:#fff;color:var(--text);outline:none;transition:border .2s}
    .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
    .field textarea{resize:vertical;min-height:80px}
    .field .date-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .submit-btn{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:.95rem;font-family:'DM Sans',sans-serif;cursor:pointer;font-weight:500;transition:opacity .2s}
    .submit-btn:hover{opacity:.9}
    .submit-btn:disabled{opacity:.5;cursor:not-allowed}
    .form-success{display:none;padding:16px;background:var(--approved-light);border:1px solid #b8dfc9;border-radius:8px;text-align:center;font-size:.88rem;color:var(--approved);margin-top:12px}
    .form-error{display:none;padding:12px;background:#fff0f0;border:1px solid #ffccc9;border-radius:8px;font-size:.85rem;color:#a33;margin-top:12px}

    /* LEFT COLUMN */
    .left-col{display:flex;flex-direction:column;gap:24px}

    /* CALENDAR */
    .section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;animation:fadeUp .4s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .section-header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface-2)}
    .section-header h2{font-family:'DM Serif Display',serif;font-size:1.1rem;font-weight:400;display:flex;align-items:center;gap:10px}
    .icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.9rem}
    .badge{font-size:.72rem;font-weight:600;padding:3px 10px;border-radius:20px;background:var(--surface-2);color:var(--text-muted);border:1px solid var(--border)}

    /* MINI CALENDAR */
    .cal-nav{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border)}
    .cal-nav button{background:none;border:1px solid var(--border);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;color:var(--text-muted)}
    .cal-nav button:hover{background:var(--surface-2)}
    .cal-month{font-weight:600;font-size:.95rem}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:12px 16px 16px;gap:2px}
    .cal-day-header{text-align:center;font-size:.72rem;font-weight:600;color:var(--text-muted);padding:6px 0;text-transform:uppercase;letter-spacing:.04em}
    .cal-day{text-align:center;padding:6px 2px;border-radius:6px;font-size:.85rem;cursor:default;position:relative;min-height:32px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:2px}
    .cal-day.today{background:var(--accent);color:#fff;font-weight:600}
    .cal-day.other-month{color:var(--text-light,#ccc)}
    .cal-day.has-event{font-weight:500}
    .cal-dot{width:5px;height:5px;border-radius:50%;display:block}

    /* EVENT LIST */
    .event-list{padding:4px 0}
    .event-row{display:grid;grid-template-columns:1fr 130px 110px;align-items:center;padding:12px 24px;border-bottom:1px solid var(--border);gap:12px}
    .event-row:last-child{border-bottom:none}
    .event-row:hover{background:var(--surface-2)}
    .event-name{font-weight:500;font-size:.9rem}
    .event-dates{font-size:.82rem;color:var(--text-muted)}
    .event-type{font-size:.76rem;padding:3px 10px;border-radius:20px;font-weight:500;display:inline-block}
    .type-timeoff{background:#e8f2f5;color:#2d6a7f}
    .type-sick{background:#fceef3;color:#b84c6e}
    .type-unpaid{background:#f0ede8;color:#6b6560}
    .type-pending{background:var(--pending-light);color:var(--pending)}
    .type-birthday{background:#f0eef8;color:#6b4fa8}
    .type-anniversary{background:#eaf4ee;color:#3a7d5a}
    .type-firstday{background:#e6f4ec;color:#2d7a4f}
    .type-holiday{background:#fefae8;color:#8a7020}
    .type-other{background:var(--surface-2);color:var(--text-muted)}

    .empty{padding:32px 24px;text-align:center;color:var(--text-muted)}
    .empty .empty-icon{font-size:1.6rem;margin-bottom:8px}
    .empty p{font-size:.88rem}
    .loading{padding:32px 24px;text-align:center;color:var(--text-muted);font-size:.88rem}
    .spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
    @keyframes spin{to{transform:rotate(360deg)}}

    .toast{position:fixed;bottom:24px;right:24px;background:#1a1714;color:#fff;padding:12px 20px;border-radius:10px;font-size:.85rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
    .toast.show{opacity:1}
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Team Time-Off Dashboard</h1>
    <div class="tag">PROVIDER PORTAL</div>
  </div>
  <div class="header-right">
    <span id="last-updated"></span>
    <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
  </div>
</header>

<main>
  <!-- LEFT COLUMN -->
  <div class="left-col">

    <!-- Mini Calendar -->
    <div class="section">
      <div class="section-header">
        <h2><span class="icon" style="background:#e8f2f5">📅</span>Calendar</h2>
      </div>
      <div class="cal-nav">
        <button onclick="changeMonth(-1)">‹</button>
        <span class="cal-month" id="cal-month"></span>
        <button onclick="changeMonth(1)">›</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>

    <!-- Upcoming Events -->
    <div class="section">
      <div class="section-header">
        <h2><span class="icon" style="background:#f5f0ea">🗓</span>Upcoming Events <span style="font-family:'DM Sans';font-size:.8rem;color:var(--text-muted);font-weight:400;margin-left:4px">(next 30 days)</span></h2>
        <span class="badge" id="upcoming-count">0</span>
      </div>
      <div id="upcoming-list" class="event-list"><div class="loading"><div class="spinner"></div>Loading...</div></div>
    </div>

  </div>

  <!-- RIGHT COLUMN: Request Form -->
  <div class="form-card">
    <div class="form-header">
      <h2>✉️ Request Time Off</h2>
    </div>
    <div class="form-body">
      <div class="field">
        <label>Your Name</label>
        <input type="text" id="req-name" placeholder="Dr. Jane Smith" />
      </div>
      <div class="field">
        <label>Dates</label>
        <div class="date-row">
          <input type="date" id="req-start" />
          <input type="date" id="req-end" />
        </div>
      </div>
      <div class="field">
        <label>Leave Type</label>
        <select id="req-type">
          <option value="PTO">PTO</option>
          <option value="Sick Time">Sick Time</option>
          <option value="Unpaid Time Off">Unpaid Time Off</option>
        </select>
      </div>
      <div class="field">
        <label>Coverage Plan</label>
        <textarea id="req-coverage" placeholder="Who will cover your patients? Any special instructions?"></textarea>
      </div>
      <button class="submit-btn" id="submit-btn" onclick="submitRequest()">Submit Request</button>
      <div class="form-success" id="form-success">
        ✓ Your request has been submitted! A manager will review it shortly.
      </div>
      <div class="form-error" id="form-error"></div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
  const WORKER_URL = 'https://restless-dust-40de.davidlewisj.workers.dev';
  let allEvents = [];
  let calYear = new Date().getFullYear();
  let calMonth = new Date().getMonth();

  const TYPE_LABELS={timeoff:'Time Off',sick:'Sick',unpaid:'Unpaid',pending:'Pending',birthday:'Birthday',anniversary:'Anniversary',firstday:'First Day',holiday:'Holiday',other:'Other'};
  const TYPE_COLORS={timeoff:'#2d6a7f',sick:'#b84c6e',unpaid:'#6b6560',pending:'#c4622d',birthday:'#6b4fa8',anniversary:'#3a7d5a',firstday:'#2d7a4f',holiday:'#8a7020',other:'#8a8178'};

  // ── HELPERS ─────────────────────────────────────────────────────────────────
  function parseD(s){ if(!s)return null; return s.includes('T')?new Date(s):new Date(s+'T00:00:00'); }
  function fmtDate(s){ const d=parseD(s);if(!d)return '';return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
  function fmtRange(e){
    const s=e.startDate,en=e.endDate;if(!s)return '';
    let endAdj=parseD(en);
    if(e.endIsDate&&endAdj)endAdj.setDate(endAdj.getDate()-1);
    const sf=fmtDate(s),ef=fmtDate(endAdj?.toISOString().split('T')[0]);
    return sf===ef||!ef?sf:sf+' – '+ef;
  }
  function eventOnDate(e, y, m, d){
    const start=parseD(e.startDate);
    let end=parseD(e.endDate);
    if(e.endIsDate&&end)end.setDate(end.getDate()-1);
    if(!start||!end)return false;
    const target=new Date(y,m,d);
    return start<=target&&target<=end;
  }
  function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
  function set(id,val){document.getElementById(id).textContent=val;}

  // ── CALENDAR ─────────────────────────────────────────────────────────────────
  function changeMonth(dir){ calMonth+=dir; if(calMonth>11){calMonth=0;calYear++;}else if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); }

  function renderCalendar() {
    const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
    document.getElementById('cal-month').textContent=`${monthNames[calMonth]} ${calYear}`;
    const grid=document.getElementById('cal-grid');
    const today=new Date();
    const firstDay=new Date(calYear,calMonth,1).getDay();
    const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
    const startOffset=firstDay===0?6:firstDay-1;

    let html='';
    ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(d=>{
      html+=`<div class="cal-day-header">${d}</div>`;
    });

    for(let i=0;i<startOffset;i++) html+=`<div class="cal-day other-month"></div>`;

    for(let d=1;d<=daysInMonth;d++){
      const isToday=today.getFullYear()===calYear&&today.getMonth()===calMonth&&today.getDate()===d;
      const dayEvents=allEvents.filter(e=>e.type!=='payday'&&eventOnDate(e,calYear,calMonth,d));
      const dots=dayEvents.slice(0,3).map(e=>`<span class="cal-dot" style="background:${TYPE_COLORS[e.type]??'#8a8178'}"></span>`).join('');
      html+=`<div class="cal-day${isToday?' today':''}${dayEvents.length?' has-event':''}">
        <span>${d}</span>
        <div style="display:flex;gap:2px;flex-wrap:wrap;justify-content:center">${dots}</div>
      </div>`;
    }

    grid.innerHTML=html;
  }

  // ── EVENT LIST ───────────────────────────────────────────────────────────────
  function renderRow(e) {
    return `<div class="event-row">
      <div class="event-name">${e.summary}</div>
      <div class="event-dates">${fmtRange(e)}</div>
      <div><span class="event-type type-${e.type}">${TYPE_LABELS[e.type]??'Other'}</span></div>
    </div>`;
  }

  function renderList(id, events, emptyMsg) {
    document.getElementById(id).innerHTML = events.length
      ? events.map(renderRow).join('')
      : `<div class="empty"><div class="empty-icon">✓</div><p>${emptyMsg}</p></div>`;
  }

  // ── SUBMIT REQUEST ───────────────────────────────────────────────────────────
  async function submitRequest() {
    const name     = document.getElementById('req-name').value.trim();
    const start    = document.getElementById('req-start').value;
    const end      = document.getElementById('req-end').value;
    const leaveType= document.getElementById('req-type').value;
    const coverage = document.getElementById('req-coverage').value.trim();

    const errEl = document.getElementById('form-error');
    errEl.style.display='none';

    if (!name)  { errEl.textContent='Please enter your name.'; errEl.style.display='block'; return; }
    if (!start) { errEl.textContent='Please select a start date.'; errEl.style.display='block'; return; }
    if (!end)   { errEl.textContent='Please select an end date.'; errEl.style.display='block'; return; }
    if (end < start) { errEl.textContent='End date must be after start date.'; errEl.style.display='block'; return; }

    const btn = document.getElementById('submit-btn');
    btn.disabled=true; btn.textContent='Submitting...';

    try {
      const res = await fetch(`${WORKER_URL}/request`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, startDate: start, endDate: end, leaveType, coveragePlan: coverage }),
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.error);

      document.getElementById('form-success').style.display='block';
      document.getElementById('req-name').value='';
      document.getElementById('req-start').value='';
      document.getElementById('req-end').value='';
      document.getElementById('req-coverage').value='';
      setTimeout(()=>{document.getElementById('form-success').style.display='none';},5000);
      setTimeout(loadData, 1500);

    } catch(err) {
      errEl.textContent='Failed to submit: '+err.message;
      errEl.style.display='block';
    } finally {
      btn.disabled=false; btn.textContent='Submit Request';
    }
  }

  // ── LOAD DATA ────────────────────────────────────────────────────────────────
  async function loadData() {
    set('last-updated','Refreshing...');
    try {
      const res = await fetch(`${WORKER_URL}/`);
      if (!res.ok) throw new Error(`Worker error: ${res.status}`);
      const { events, updatedAt } = await res.json();
      allEvents = events;

      const now=new Date(), future=new Date();
      future.setDate(now.getDate()+30);

      const upcoming = events
        .filter(e=>e.type!=='payday')
        .filter(e=>parseD(e.startDate)<=future);

      set('upcoming-count', upcoming.length);
      renderList('upcoming-list', upcoming, 'No upcoming events in the next 30 days');
      renderCalendar();

      const t=new Date(updatedAt);
      set('last-updated','Updated '+t.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}));

    } catch(err) {
      set('last-updated','Failed to load');
    }
  }

  // Set default dates to today and tomorrow
  const todayStr = new Date().toISOString().split('T')[0];
  const tomorrowStr = new Date(Date.now()+86400000).toISOString().split('T')[0];
  document.getElementById('req-start').value = todayStr;
  document.getElementById('req-end').value = todayStr;

  loadData();
  renderCalendar();
  setInterval(loadData, 15*60*1000);
</script>
</body>
</html>
