<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TMJ Team Time Off</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f7f5f2; --surface: #ffffff; --surface-2: #f0ede8;
      --border: #e5e0d8; --text: #1a1714; --text-muted: #8a8178;
      --accent: #2d6a7f; --accent-light: #e8f2f5;
      --pending: #c4622d; --pending-light: #fdf0e8;
      --approved: #3a7d5a; --approved-light: #eaf4ee;
      --sick: #b84c6e; --sick-light: #fceef3;
      --unpaid: #6b6560; --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    header { background: var(--accent); color: white; padding: 28px 40px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .header-left h1 { font-family: 'DM Serif Display', serif; font-size: 1.8rem; font-weight: 400; letter-spacing: -0.02em; }
    .header-left p { font-size: 0.85rem; opacity: 0.7; margin-top: 4px; }
    #last-updated { font-size: 0.78rem; opacity: 0.65; }
    .refresh-btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); color: white; padding: 7px 16px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.2s; }
    .refresh-btn:hover { background: rgba(255,255,255,0.25); }
    main { max-width: 1100px; margin: 0 auto; padding: 32px 24px 64px; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; box-shadow: var(--shadow); }
    .stat-card .number { font-family: 'DM Serif Display', serif; font-size: 2.4rem; color: var(--accent); }
    .stat-card .label { font-size: 0.78rem; color: var(--text-muted); margin-top: 6px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; }
    .section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 24px; overflow: hidden; animation: fadeUp 0.4s ease both; }
    .section:nth-child(1){animation-delay:0.05s} .section:nth-child(2){animation-delay:0.1s} .section:nth-child(3){animation-delay:0.15s} .section:nth-child(4){animation-delay:0.2s}
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    .section-header { padding: 18px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--surface-2); }
    .section-header h2 { font-family: 'DM Serif Display', serif; font-size: 1.1rem; font-weight: 400; display: flex; align-items: center; gap: 10px; }
    .section-header .icon { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; }
    .badge { font-size: 0.72rem; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
    .badge-pending { background: var(--pending-light); color: var(--pending); }
    .badge-neutral { background: var(--surface-2); color: var(--text-muted); border: 1px solid var(--border); }
    .event-list { padding: 4px 0; }
    .event-row { display: grid; grid-template-columns: 1fr 140px 120px 120px; align-items: center; padding: 13px 24px; border-bottom: 1px solid var(--border); transition: background 0.15s; gap: 12px; }
    .event-row:last-child { border-bottom: none; }
    .event-row:hover { background: var(--surface-2); }
    .event-name { font-weight: 500; font-size: 0.9rem; }
    .event-entity { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }
    .event-dates { font-size: 0.82rem; color: var(--text-muted); }
    .event-type { font-size: 0.76rem; padding: 3px 10px; border-radius: 20px; font-weight: 500; display: inline-block; }
    .type-timeoff { background: #e8f2f5; color: #2d6a7f; }
    .type-sick { background: var(--sick-light); color: var(--sick); }
    .type-unpaid { background: #f0ede8; color: var(--unpaid); }
    .type-pending { background: var(--pending-light); color: var(--pending); }
    .type-other { background: var(--surface-2); color: var(--text-muted); }
    .status-pill { font-size: 0.75rem; padding: 3px 10px; border-radius: 20px; font-weight: 600; display: inline-flex; align-items: center; gap: 4px; }
    .status-pending { background: var(--pending-light); color: var(--pending); }
    .status-approved { background: var(--approved-light); color: var(--approved); }
    .empty { padding: 36px 24px; text-align: center; color: var(--text-muted); }
    .empty .empty-icon { font-size: 1.8rem; margin-bottom: 8px; }
    .empty p { font-size: 0.88rem; }
    .loading { padding: 36px 24px; text-align: center; color: var(--text-muted); font-size: 0.88rem; }
    .spinner { width: 22px; height: 22px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .error-banner { background: #fff3f0; border: 1px solid #ffd4cc; border-radius: var(--radius); padding: 16px 20px; margin-bottom: 24px; font-size: 0.85rem; color: #a33; display: none; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    @media(max-width:640px){
      header{padding:20px;flex-direction:column;align-items:flex-start}
      main{padding:20px 16px 48px}
      .event-row{grid-template-columns:1fr 90px}
      .event-dates,.event-type{display:none}
    }
  </style>
</head>
<body>
<header>
  <div class="header-left">
    <h1>TMJ Team Time Off</h1>
    <p>Center · Creekside · SMS · Solutions</p>
  </div>
  <div class="header-right">
    <span id="last-updated"></span>
    <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
  </div>
</header>

<main>
  <div class="error-banner" id="error-banner"></div>
  <div class="stats">
    <div class="stat-card"><div class="number" id="stat-today">–</div><div class="label">Out Today</div></div>
    <div class="stat-card"><div class="number" id="stat-week">–</div><div class="label">Out This Week</div></div>
    <div class="stat-card"><div class="number" id="stat-pending">–</div><div class="label">Pending Approval</div></div>
    <div class="stat-card"><div class="number" id="stat-upcoming">–</div><div class="label">Upcoming (30 days)</div></div>
  </div>

  <div class="section">
    <div class="section-header">
      <h2><span class="icon" style="background:#fdf0e8">⏳</span> Pending Approval</h2>
      <span class="badge badge-pending" id="pending-count">0</span>
    </div>
    <div id="pending-list" class="event-list"><div class="loading"><div class="spinner"></div>Loading...</div></div>
  </div>

  <div class="section">
    <div class="section-header">
      <h2><span class="icon" style="background:#e8f2f5">📅</span> Out Today</h2>
      <span class="badge badge-neutral" id="today-count">0</span>
    </div>
    <div id="today-list" class="event-list"><div class="loading"><div class="spinner"></div>Loading...</div></div>
  </div>

  <div class="section">
    <div class="section-header">
      <h2><span class="icon" style="background:#eaf4ee">📆</span> Out This Week</h2>
      <span class="badge badge-neutral" id="week-count">0</span>
    </div>
    <div id="week-list" class="event-list"><div class="loading"><div class="spinner"></div>Loading...</div></div>
  </div>

  <div class="section">
    <div class="section-header">
      <h2><span class="icon" style="background:#f5f0ea">🗓</span> Upcoming Time Off <span style="font-family:'DM Sans';font-size:0.8rem;color:var(--text-muted);font-weight:400;margin-left:4px;">(next 30 days)</span></h2>
      <span class="badge badge-neutral" id="upcoming-count">0</span>
    </div>
    <div id="upcoming-list" class="event-list"><div class="loading"><div class="spinner"></div>Loading...</div></div>
  </div>
</main>

<script>
  const API_KEY     = 'YOUR_GOOGLE_CALENDAR_API_KEY';
  const CALENDAR_ID = 'YOUR_DEST_CALENDAR_ID';

  function today() { return new Date(new Date().toDateString()); }
  function weekStart() { const d=today(),day=d.getDay(); d.setDate(d.getDate()-(day===0?6:day-1)); return d; }
  function weekEnd()   { const d=weekStart(); d.setDate(d.getDate()+6); d.setHours(23,59,59); return d; }

  function formatDate(s) {
    if (!s) return '';
    return new Date(s+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
  }

  function formatDateRange(start, end) {
    const s = start?.date ?? start?.dateTime?.split('T')[0];
    const e = end?.date ?? end?.dateTime?.split('T')[0];
    if (!s) return '';
    const endAdj = new Date(e+'T00:00:00');
    if (end?.date) endAdj.setDate(endAdj.getDate()-1);
    const sf = formatDate(s), ef = formatDate(endAdj.toISOString().split('T')[0]);
    return sf===ef ? sf : sf+' – '+ef;
  }

  function isTimeOff(s) {
    if (!s) return false;
    const l=s.toLowerCase();
    return l.includes('time off')||l.includes('sick')||l.includes('unpaid')||
           l.includes('vacation')||l.includes('pto')||l.includes('leave')||l.includes('⏳');
  }

  function getType(s) {
    if (!s) return 'other';
    const l=s.toLowerCase();
    if (l.includes('⏳')||l.startsWith('pending')) return 'pending';
    if (l.includes('sick'))   return 'sick';
    if (l.includes('unpaid')) return 'unpaid';
    if (l.includes('time off')||l.includes('vacation')||l.includes('pto')||l.includes('leave')) return 'timeoff';
    return 'other';
  }

  function getEntity(desc) {
    if (!desc) return '';
    const m=desc.match(/Synced from: (.+)/);
    return m ? m[1].trim() : '';
  }

  function onDay(e, d) {
    const s=e.start?.date??e.start?.dateTime?.split('T')[0];
    const en=e.end?.date??e.end?.dateTime?.split('T')[0];
    if (!s) return false;
    const start=new Date(s+'T00:00:00');
    const end=new Date(en+'T00:00:00');
    if (e.end?.date) end.setDate(end.getDate()-1);
    return start<=d&&d<=end;
  }

  function inRange(e, from, to) {
    const s=e.start?.date??e.start?.dateTime?.split('T')[0];
    const en=e.end?.date??e.end?.dateTime?.split('T')[0];
    if (!s) return false;
    const start=new Date(s+'T00:00:00');
    const end=new Date(en+'T00:00:00');
    if (e.end?.date) end.setDate(end.getDate()-1);
    return start<=to&&end>=from;
  }

  function renderRow(e) {
    const sum=e.summary??'Time Off';
    const isPend=sum.includes('⏳');
    const type=getType(sum);
    const entity=getEntity(e.description);
    const dateRange=formatDateRange(e.start,e.end);
    const cleanName=sum.replace('⏳ ','').replace('Pending ','');
    const typeLabels={pending:'Pending',sick:'Sick',unpaid:'Unpaid',timeoff:'Time Off',other:'Other'};
    const statusPill=isPend
      ? `<span class="status-pill status-pending">⏳ Pending</span>`
      : `<span class="status-pill status-approved">✓ Approved</span>`;
    return `<div class="event-row">
      <div><div class="event-name">${cleanName}</div><div class="event-entity">${entity}</div></div>
      <div class="event-dates">${dateRange}</div>
      <div><span class="event-type type-${type}">${typeLabels[type]}</span></div>
      <div>${statusPill}</div>
    </div>`;
  }

  function renderList(id, events, empty) {
    const el=document.getElementById(id);
    el.innerHTML = events.length
      ? events.map(renderRow).join('')
      : `<div class="empty"><div class="empty-icon">✓</div><p>${empty}</p></div>`;
  }

  async function loadData() {
    document.getElementById('last-updated').textContent='Refreshing...';
    const now=new Date(), future=new Date();
    future.setDate(now.getDate()+30);
    const url=`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events?key=${API_KEY}&timeMin=${now.toISOString()}&timeMax=${future.toISOString()}&singleEvents=true&orderBy=startTime&maxResults=500`;
    try {
      const res=await fetch(url);
      if (!res.ok) throw new Error(`API error ${res.status}`);
      const data=await res.json();
      const all=(data.items??[]).filter(e=>isTimeOff(e.summary));
      const td=today(), ws=weekStart(), we=weekEnd();
      const pending  = all.filter(e=>e.summary?.includes('⏳'));
      const todayEvt = all.filter(e=>!e.summary?.includes('⏳')&&onDay(e,td));
      const weekEvt  = all.filter(e=>!e.summary?.includes('⏳')&&inRange(e,ws,we));
      const upcoming = all.filter(e=>!e.summary?.includes('⏳'));
      document.getElementById('stat-today').textContent   = todayEvt.length;
      document.getElementById('stat-week').textContent    = weekEvt.length;
      document.getElementById('stat-pending').textContent = pending.length;
      document.getElementById('stat-upcoming').textContent= upcoming.length;
      document.getElementById('pending-count').textContent= pending.length;
      document.getElementById('today-count').textContent  = todayEvt.length;
      document.getElementById('week-count').textContent   = weekEvt.length;
      document.getElementById('upcoming-count').textContent=upcoming.length;
      renderList('pending-list',  pending,  'No pending requests — all clear ✓');
      renderList('today-list',    todayEvt, 'Nobody out today ✓');
      renderList('week-list',     weekEvt,  'Nobody out this week ✓');
      renderList('upcoming-list', upcoming, 'No upcoming time off in the next 30 days');
      document.getElementById('last-updated').textContent='Updated '+new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
      document.getElementById('error-banner').style.display='none';
    } catch(err) {
      const b=document.getElementById('error-banner');
      b.style.display='block';
      b.textContent=`Could not load calendar data: ${err.message}. Check your API key and Calendar ID.`;
      document.getElementById('last-updated').textContent='Failed to load';
    }
  }

  loadData();
  setInterval(loadData, 15*60*1000);
</script>
</body>
</html>
